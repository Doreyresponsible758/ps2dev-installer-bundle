name: Smoke Checks

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate shell scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n install.sh verify_install.sh uninstall.sh ps2dev_aio_installer.sh

      - name: Validate PowerShell launcher syntax
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          [void][scriptblock]::Create((Get-Content -Raw 'ps2dev_aio_installer.ps1'))

      - name: Validate release archive contents
        shell: bash
        run: |
          set -Eeuo pipefail

          bundle_root="ps2dev-installer-bundle-smoke"
          zip_name="$bundle_root.zip"

          mkdir -p "dist/$bundle_root"
          install -m 0644 README.md "dist/$bundle_root/README.md"
          install -m 0644 ps2dev_aio_installer.bat "dist/$bundle_root/ps2dev_aio_installer.bat"
          install -m 0644 ps2dev_aio_installer.ps1 "dist/$bundle_root/ps2dev_aio_installer.ps1"
          install -m 0755 ps2dev_aio_installer.sh "dist/$bundle_root/ps2dev_aio_installer.sh"
          install -m 0755 install.sh "dist/$bundle_root/install.sh"
          install -m 0755 uninstall.sh "dist/$bundle_root/uninstall.sh"
          install -m 0755 verify_install.sh "dist/$bundle_root/verify_install.sh"

          (
            cd dist
            zip -r "$zip_name" "$bundle_root"
          )

          unzip -l "dist/$zip_name"
